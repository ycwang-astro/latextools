# style file for raa.cls
# for the official LaTeX templates, see https://www.raa-journal.org/sub/macro/
author: | 
    ((* if order == 1 *)) 
        \author{ 
    ((* else *))
        \and 
    ((* endif *))
    [[name]] 
    \inst{
    [[ affil_number | join(', ') ]]
    }

closing: |
    }

affiliation: |
    ((* if number == 1 *))
        \institute{ 
    ((* else *))
        \and 
    ((* endif *))
    [[affil]]
    ((* INS [[affil_emails]] *))

format: 
    - authors:
        - author
    - closing
    - affiliation:
        - affiliation
    - closing
