# style file for aa.cls
# for the official documentation, see https://www.aanda.org/for-authors
author: | 
    ((* if  order == 1 *))
        \author{ 
    ((* else *))
        \and 
    ((* endif *))
    [[name]] 
    \inst{
    [[ affil_number | join(', ') ]]
    ((* if corresponding *))
        \thanks{\email{[[email]]}}
    ((* endif *))
    }

closing: |
    }

affiliation: |
    ((* if number == 1 *)) 
        \institute{ 
    ((* else *))
        \and 
    ((* endif *))
    [[affil]]
    
#     &INS( &(affil_emails) )

format: 
    - authors:
        - author
    - closing
    - affiliation:
        - affiliation
    - closing
