# style file for aastex7.cls
# for the official LaTeX templates, see https://journals.aas.org/aastex-package-for-manuscript-preparation/#_download
# Note that AASTeX v7 requires all authors to have an email address. 

author: |
    \author[
        ((* INS gname=[[name.givenName]], *))
        ((* INS sname=[[name.surname]], *))
        ((* INS suffix=[[name.suffix]], *))
        ((* INS [[orcid]] *))
    ]{
        [[name]]
    }
    
    [['\n']]
    
    \email{
        ((* INS [[email]] *))
    } 
    
    ((* if equalContribution *))
        [['\n']]
        \altaffiliation{These authors contributed equally to this work.}
    ((* endif *))
    
affiliation: |
    \affiliation{
    [[affil]]
    ((* INS [[affil_emails]] *))
    }

format: 
    authors: 
        - author
        - affiliation
        - newline
